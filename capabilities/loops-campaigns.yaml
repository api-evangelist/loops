    namespace: loops-campaigns-rest
    port: 8080
    description: REST adapter for Loops OpenAPI Spec — Campaigns. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/campaigns
      name: campaigns
      description: REST surface for campaigns.
      operations:
      - method: GET
        name: get
        description: List campaigns
        call: loops-campaigns.get
        with:
          perPage: rest.perPage
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create a campaign
        call: loops-campaigns.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/campaigns/{campaignid}
