    resources:
    - name: campaigns
      path: /campaigns
      operations:
      - name: get
        method: GET
        description: List campaigns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: perPage
          in: query
          type: string
          description: How many results to return in each request. Must be between 10 and 50. Default is 20.
        - name: cursor
          in: query
          type: string
          description: A cursor to return a specific page of results. Cursors can be found from the `pagination.nextCursor`
            value in each response.
      - name: post
        method: POST
        description: Create a campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
