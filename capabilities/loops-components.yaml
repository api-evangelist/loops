naftiko: 1.0.0-alpha2
info:
  label: Loops OpenAPI Spec — Components
  description: 'Loops OpenAPI Spec — Components. 2 operations. Lead operation: List components. Self-contained Naftiko capability
    covering one Loops business surface.'
  tags:
  - Loops
  - Components
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LOOPS_API_KEY: LOOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: loops-components
    baseUri: https://app.loops.so/api/v1
    description: Loops OpenAPI Spec — Components business capability. Self-contained, no shared references.
    resources:
    - name: components
      path: /components
      operations:
      - name: get
        method: GET
        description: List components
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: perPage
          in: query
          type: string
          description: How many results to return in each request. Must be between 10 and 50. Default is 20.
        - name: cursor
          in: query
          type: string
          description: A cursor to return a specific page of results. Cursors can be found from the `pagination.nextCursor`
            value in each response.
    - name: components-componentId
      path: /components/{componentId}
      operations:
      - name: get
        method: GET
        description: Get a component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.LOOPS_API_KEY}}'
  exposes:
  - type: rest
    namespace: loops-components-rest
    port: 8080
    description: REST adapter for Loops OpenAPI Spec — Components. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/components
      name: components
      description: REST surface for components.
      operations:
      - method: GET
        name: get
        description: List components
        call: loops-components.get
        with:
          perPage: rest.perPage
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/components/{componentid}
      name: components-componentid
      description: REST surface for components-componentId.
      operations:
      - method: GET
        name: get
        description: Get a component
        call: loops-components.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: loops-components-mcp
    port: 9090
    transport: http
    description: MCP adapter for Loops OpenAPI Spec — Components. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-components
      description: List components
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: loops-components.get
      with:
        perPage: tools.perPage
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: get-component
      description: Get a component
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: loops-components.get
      outputParameters:
      - type: object
        mapping: $.
